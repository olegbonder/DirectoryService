services:
  ds-postgres-dev:
    container_name: ds-postgres-dev
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: directory_service_db_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    networks:
      - dev-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  fs-postgres-dev:
    container_name: fs-postgres-dev
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: file_service_db_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5437:5432"
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    networks:
      - dev-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  as-postgres-dev:
    container_name: as-postgres-dev
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: auth_service_db_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5440:5432"
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    networks:
      - dev-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  seq-dev:
    container_name: seq-dev
    image: datalust/seq:latest
    ports:
      - "5341:5341"
      - "8080:80"
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_NOAUTHENTICATION: "true"
    restart: always
    volumes:
      - seq-dev-data:/data
    networks:
      - dev-network

  redis-dev:
    container_name: redis-dev
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - redis-dev-data:/data
    networks:
      - dev-network
    restart: always

  fs-minio-dev:
    container_name: fs-minio-dev
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9002:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server --console-address ":9001" /data
    restart: always
    networks:
      - dev-network

  rabbitmq-dev:
    image: rabbitmq:4.2-management
    container_name: rabbitmq-dev
    ports:
      - "5673:5672"
      - "15673:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - rabbitmq_dev_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always
    networks:
      - dev-network

networks:
  dev-network:
    driver: bridge
    name: dev-network

volumes:
  postgres-dev-data:
    name: postgres-dev-data
  seq-dev-data:
    name: seq-dev-data
  redis-dev-data:
    name: redis-dev-data
  rabbitmq_dev_data:
    name: rabbitmq-dev-data
